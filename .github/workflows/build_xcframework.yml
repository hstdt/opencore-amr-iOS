name: Build and Release XCFramework

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (must start with "v", e.g., v0.1.6)'
        required: true
        default: 'v0.1.6'

permissions:
  contents: write

env:
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Validate release version
      id: version
      run: |
        if [[ "${{ github.ref_type }}" != "branch" ]]; then
          echo "Error: Run this workflow from a branch so it can commit Package.swift before tagging."
          exit 1
        fi

        VERSION="${{ github.event.inputs.release_version }}"
        if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?$ ]]; then
          echo "Error: Invalid version format. Must start with 'v' followed by semantic versioning."
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: macos-latest
    strategy:
      matrix:
        config:
          - { sdk: 'macosx', arch: 'arm64', platform: 'MacOSX' }
          - { sdk: 'macosx', arch: 'x86_64', platform: 'MacOSX' }
          - { sdk: 'iphoneos', arch: 'arm64', platform: 'iPhoneOS' }
          - { sdk: 'iphonesimulator', arch: 'x86_64', platform: 'iPhoneSimulator' }
          - { sdk: 'iphonesimulator', arch: 'arm64', platform: 'iPhoneSimulator' }
          - { sdk: 'appletvos', arch: 'arm64', platform: 'AppleTVOS' }
          - { sdk: 'appletvsimulator', arch: 'x86_64', platform: 'AppleTVSimulator' }
          - { sdk: 'appletvsimulator', arch: 'arm64', platform: 'AppleTVSimulator' }
          - { sdk: 'xros', arch: 'arm64', platform: 'XROS' }
          - { sdk: 'xrsimulator', arch: 'x86_64', platform: 'XRSimulator' }
          - { sdk: 'xrsimulator', arch: 'arm64', platform: 'XRSimulator' }
          - { sdk: 'watchos', arch: 'arm64_32', platform: 'WatchOS' }
          - { sdk: 'watchos', arch: 'arm64', platform: 'WatchOS' }
          - { sdk: 'watchsimulator', arch: 'x86_64', platform: 'WatchSimulator' }
          - { sdk: 'watchsimulator', arch: 'arm64', platform: 'WatchSimulator' }

    steps:
    - uses: actions/checkout@v6

    - name: Get Xcode version
      id: xcode-version
      run: echo "version=$(xcodebuild -version | grep Xcode | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Get macOS version
      id: macos-version
      run: echo "version=$(sw_vers -productVersion)" >> $GITHUB_OUTPUT

    - name: Cache build results
      uses: actions/cache@v5
      id: cache
      with:
        path: ${{ env.OUTPUT_DIR }}
        key: ${{ runner.os }}-build-${{ matrix.config.sdk }}-${{ matrix.config.arch }}-${{ hashFiles('**/*.c', '**/*.cpp', '**/*.h', '**/*.m', '**/*.mm', '.github/actions/*.sh', 'scripts/*.sh') }}-${{ steps.xcode-version.outputs.version }}-${{ steps.macos-version.outputs.version }}

    - name: Set up Xcode
      if: steps.cache.outputs.cache-hit != 'true'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install autotools
      if: steps.cache.outputs.cache-hit != 'true'
      run: brew install autoconf automake libtool

    - name: Setup build environment
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        aclocal && autoconf && automake --add-missing
        mkdir -p "$OUTPUT_DIR"

    - name: Build for ${{ matrix.config.sdk }} ${{ matrix.config.arch }}
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        ./.github/actions/build_library.sh ${{ matrix.config.sdk }} ${{ matrix.config.arch }} ${{ matrix.config.platform }}

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ matrix.config.sdk }}-${{ matrix.config.arch }}
        path: ${{ env.OUTPUT_DIR }}
        retention-days: 1

  create-xcframework:
    needs:
      - prepare
      - build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all build artifacts
      uses: actions/download-artifact@v8
      with:
        path: ${{ env.OUTPUT_DIR }}

    - name: Create framework-based XCFrameworks
      run: |
        ./.github/actions/create_xcframework.sh opencore-amrnb
        ./.github/actions/create_xcframework.sh opencore-amrwb
        ./scripts/validate_xcframeworks.sh "$OUTPUT_DIR"

    - name: Zip XCFrameworks
      run: |
        ./scripts/zip_xcframeworks.sh "${OUTPUT_DIR}"

    - name: Update Package.swift with CI checksums
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        ./scripts/update_package_swift.sh \
          "$VERSION" \
          "${OUTPUT_DIR}/OpenCoreAMRNB.xcframework.zip" \
          "${OUTPUT_DIR}/OpenCoreAMRWB.xcframework.zip"

        ./scripts/check_package_swift.sh \
          "$VERSION" \
          "${OUTPUT_DIR}/OpenCoreAMRNB.xcframework.zip" \
          "${OUTPUT_DIR}/OpenCoreAMRWB.xcframework.zip"

    - name: Commit Package.swift and update tag
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        BRANCH="${GITHUB_REF_NAME}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add Package.swift
        if git diff --cached --quiet; then
          echo "Package.swift already contains CI checksums."
        else
          git commit -m "Update ${VERSION} binary checksums"
          git push origin "HEAD:${BRANCH}"
        fi

        git tag -f "$VERSION" HEAD
        git push origin "refs/tags/${VERSION}" --force

    - name: Upload XCFrameworks
      uses: actions/upload-artifact@v7
      with:
        name: XCFrameworks
        path: |
          ${{ env.OUTPUT_DIR }}/*.xcframework.zip
          ${{ env.OUTPUT_DIR }}/checksums.txt
        if-no-files-found: error

  release:
    needs:
      - prepare
      - create-xcframework
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: XCFrameworks
        path: artifacts

    - name: Create Release and Upload XCFrameworks
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.prepare.outputs.version }}
        name: Release ${{ needs.prepare.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
        overwrite_files: true
        files: |
          artifacts/*.xcframework.zip
          artifacts/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
